<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>M叽充值管理</title>
  <style>
    :root{color-scheme:dark;--bg:#090b10;--panel:#151923;--panel2:#11151e;--line:rgba(255,255,255,.1);--text:#f7f8fb;--muted:#9aa3b5;--accent:#8b7cff;--ok:#48d59a;--warn:#ffbd66;--danger:#ff7185;font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text)}body{padding:24px}.wrap{max-width:1280px;margin:0 auto}.head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}.head h1{margin:0;font-size:24px}.head p{margin:6px 0 0;color:var(--muted)}button,input,select,textarea{font:inherit}.btn{border:1px solid var(--line);background:#1a2030;color:#fff;border-radius:10px;padding:9px 13px;cursor:pointer}.btn.primary{background:var(--accent);border-color:transparent}.btn.ok{background:rgba(72,213,154,.16);border-color:rgba(72,213,154,.45);color:#baffdf}.btn.danger{background:rgba(255,113,133,.12);border-color:rgba(255,113,133,.4);color:#ffc2cb}.grid{display:grid;grid-template-columns:390px 1fr;gap:18px}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 16px 40px rgba(0,0,0,.18)}.card h2{margin:0 0 14px;font-size:17px}.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:12px;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);background:#0d1119;color:#fff;border-radius:10px;padding:10px 11px;outline:none}textarea{min-height:72px;resize:vertical}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.package-list{display:grid;gap:10px;margin-top:18px}.package{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:12px}.package-top{display:flex;justify-content:space-between;gap:10px}.package h3{margin:0;font-size:15px}.meta{color:var(--muted);font-size:12px;margin-top:5px}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:800}.badge.active,.badge.paid{background:rgba(72,213,154,.13);color:#9ff0cb}.badge.inactive,.badge.cancelled{background:rgba(255,113,133,.12);color:#ffc2cb}.badge.pending{background:rgba(255,189,102,.13);color:#ffd79c}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:12px}.toolbar select{width:auto;min-width:130px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;min-width:820px}th,td{padding:11px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:12px;vertical-align:top}th{color:var(--muted);background:#11151e;position:sticky;top:0}tr:last-child td{border-bottom:0}.muted{color:var(--muted)}.status-line{min-height:24px;color:var(--muted);margin-top:10px}.empty{padding:34px;text-align:center;color:var(--muted)}@media(max-width:900px){body{padding:14px}.grid{grid-template-columns:1fr}.head{flex-direction:column}.fields{grid-template-columns:1fr}.field.full{grid-column:auto}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div><h1>充值套餐与订单</h1><p>__TENANT_NAME__ · 套餐配置、待确认订单与幂等到账</p></div>
      <button class="btn" id="refreshAll">刷新全部</button>
    </div>

    <div class="grid">
      <section class="card">
        <h2 id="packageFormTitle">新增套餐</h2>
        <form id="packageForm">
          <input type="hidden" id="packageId" />
          <div class="fields">
            <div class="field"><label>套餐编码</label><input id="code" placeholder="starter-10" required /></div>
            <div class="field"><label>套餐名称</label><input id="name" placeholder="轻量陪伴包" required /></div>
            <div class="field"><label>价格（元）</label><input id="priceYuan" type="number" min="0.01" step="0.01" required /></div>
            <div class="field"><label>到账额度</label><input id="credits" type="number" min="0.001" step="0.001" required /></div>
            <div class="field"><label>状态</label><select id="status"><option value="active">启用</option><option value="inactive">停用</option></select></div>
            <div class="field"><label>排序</label><input id="sortOrder" type="number" value="100" /></div>
            <div class="field full"><label>说明</label><textarea id="description" placeholder="套餐说明"></textarea></div>
          </div>
          <div class="actions">
            <button class="btn primary" type="submit">保存套餐</button>
            <button class="btn" type="button" id="resetPackage">清空</button>
          </div>
        </form>
        <div class="status-line" id="packageStatus"></div>
        <div class="package-list" id="packageList"></div>
      </section>

      <section class="card">
        <div class="toolbar">
          <h2 style="margin:0">充值订单</h2>
          <div style="display:flex;gap:8px">
            <select id="orderStatus"><option value="">全部状态</option><option value="pending">待确认</option><option value="paid">已到账</option><option value="cancelled">已取消</option></select>
            <button class="btn" id="refreshOrders">刷新订单</button>
          </div>
        </div>
        <div class="table-wrap"><div id="orders"></div></div>
        <div class="status-line" id="orderMessage"></div>
      </section>
    </div>
  </div>

  <script>
    const ADMIN_TOKEN='__ADMIN_TOKEN__';
    let packages=[];
    let orders=[];
    const $=id=>document.getElementById(id);

    async function api(path,options={}){
      const response=await fetch(path,{...options,headers:{'Content-Type':'application/json','X-Mji-Admin-Token':ADMIN_TOKEN,...(options.headers||{})}});
      const data=await response.json().catch(()=>({}));
      if(!response.ok||!data.ok)throw new Error(data.error||`请求失败 ${response.status}`);
      return data;
    }

    function esc(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
    function money(value){return Number(value||0).toFixed(2);}
    function credits(value){const n=Number(value||0);return Number.isInteger(n)?String(n):n.toFixed(3).replace(/0+$/,'').replace(/\.$/,'');}
    function dt(value){if(!value)return '-';const d=new Date(value);return Number.isNaN(d.getTime())?'-':d.toLocaleString('zh-CN',{hour12:false});}
    function statusName(value){return {pending:'待确认',paid:'已到账',cancelled:'已取消'}[value]||value;}

    async function loadPackages(){
      $('packageStatus').textContent='正在加载套餐…';
      try{
        const data=await api('/api/recharge/packages');
        packages=data.packages||[];
        renderPackages();
        $('packageStatus').textContent=`共 ${packages.length} 个套餐`;
      }catch(error){$('packageStatus').textContent=error.message;}
    }

    function renderPackages(){
      const root=$('packageList');
      if(!packages.length){root.innerHTML='<div class="empty">还没有套餐</div>';return;}
      root.innerHTML=packages.map(item=>`<div class="package">
        <div class="package-top"><div><h3>${esc(item.name)}</h3><div class="meta">${esc(item.code)} · ¥${money(item.priceYuan)} · ${credits(item.credits)} 额度</div></div><span class="badge ${esc(item.status)}">${item.status==='active'?'启用':'停用'}</span></div>
        <div class="meta">${esc(item.description||'暂无说明')}</div>
        <div class="actions"><button class="btn" data-edit-package="${esc(item.id)}">编辑</button></div>
      </div>`).join('');
      root.querySelectorAll('[data-edit-package]').forEach(button=>button.addEventListener('click',()=>editPackage(button.dataset.editPackage)));
    }

    function editPackage(id){
      const item=packages.find(entry=>entry.id===id);if(!item)return;
      $('packageId').value=item.id;$('code').value=item.code;$('name').value=item.name;$('priceYuan').value=item.priceYuan;$('credits').value=item.credits;$('status').value=item.status;$('sortOrder').value=item.sortOrder;$('description').value=item.description||'';$('packageFormTitle').textContent='编辑套餐';window.scrollTo({top:0,behavior:'smooth'});
    }

    function resetPackage(){
      $('packageForm').reset();$('packageId').value='';$('sortOrder').value='100';$('status').value='active';$('packageFormTitle').textContent='新增套餐';
    }

    $('packageForm').addEventListener('submit',async event=>{
      event.preventDefault();
      const id=$('packageId').value.trim();
      const payload={code:$('code').value,name:$('name').value,priceYuan:Number($('priceYuan').value),credits:Number($('credits').value),status:$('status').value,sortOrder:Number($('sortOrder').value||100),description:$('description').value};
      $('packageStatus').textContent='正在保存…';
      try{
        await api(id?`/api/recharge/packages/${id}`:'/api/recharge/packages',{method:id?'PUT':'POST',body:JSON.stringify(payload)});
        $('packageStatus').textContent='套餐已保存';resetPackage();await loadPackages();
      }catch(error){$('packageStatus').textContent=error.message;}
    });

    async function loadOrders(){
      $('orderMessage').textContent='正在加载订单…';
      const status=$('orderStatus').value;
      try{
        const data=await api(`/api/recharge/orders?limit=300${status?`&status=${encodeURIComponent(status)}`:''}`);
        orders=data.orders||[];renderOrders();$('orderMessage').textContent=`共 ${orders.length} 笔订单`;
      }catch(error){$('orderMessage').textContent=error.message;}
    }

    function renderOrders(){
      const root=$('orders');
      if(!orders.length){root.innerHTML='<div class="empty">没有符合条件的订单</div>';return;}
      root.innerHTML=`<table><thead><tr><th>订单</th><th>用户</th><th>套餐</th><th>金额/额度</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody>${orders.map(order=>`<tr>
        <td><strong>${esc(order.orderNo)}</strong><div class="muted">${esc(order.id)}</div></td>
        <td>${esc(order.nickname||order.displayName||'微信用户')}<div class="muted">${esc(order.providerUserId||order.userId)}</div></td>
        <td>${esc(order.packageName||order.packageCode)}</td>
        <td>¥${money(order.amountYuan)}<div class="muted">${credits(order.credits)} 额度</div></td>
        <td><span class="badge ${esc(order.status)}">${esc(statusName(order.status))}</span>${order.paymentNote?`<div class="muted">${esc(order.paymentNote)}</div>`:''}</td>
        <td>${dt(order.createdAt)}${order.paidAt?`<div class="muted">到账：${dt(order.paidAt)}</div>`:''}</td>
        <td>${order.status==='pending'?`<div class="actions"><button class="btn ok" data-confirm="${esc(order.id)}">确认到账</button><button class="btn danger" data-cancel="${esc(order.id)}">取消</button></div>`:'-'}</td>
      </tr>`).join('')}</tbody></table>`;
      root.querySelectorAll('[data-confirm]').forEach(button=>button.addEventListener('click',()=>confirmOrder(button.dataset.confirm)));
      root.querySelectorAll('[data-cancel]').forEach(button=>button.addEventListener('click',()=>cancelOrder(button.dataset.cancel)));
    }

    async function confirmOrder(id){
      const order=orders.find(item=>item.id===id);if(!order)return;
      const note=prompt(`确认已收到订单 ${order.orderNo} 的款项。可填写收款备注：`,'人工确认收款');
      if(note===null)return;
      $('orderMessage').textContent='正在确认到账…';
      try{
        const data=await api(`/api/recharge/orders/${id}/confirm`,{method:'POST',body:JSON.stringify({paymentNote:note})});
        $('orderMessage').textContent=data.duplicate?'该订单此前已到账，本次未重复加额度':'订单已确认，额度已到账';await loadOrders();
      }catch(error){$('orderMessage').textContent=error.message;}
    }

    async function cancelOrder(id){
      const order=orders.find(item=>item.id===id);if(!order||!confirm(`确定取消订单 ${order.orderNo}？`))return;
      $('orderMessage').textContent='正在取消…';
      try{await api(`/api/recharge/orders/${id}/cancel`,{method:'POST',body:'{}'});$('orderMessage').textContent='订单已取消';await loadOrders();}catch(error){$('orderMessage').textContent=error.message;}
    }

    $('resetPackage').addEventListener('click',resetPackage);
    $('refreshOrders').addEventListener('click',loadOrders);
    $('orderStatus').addEventListener('change',loadOrders);
    $('refreshAll').addEventListener('click',()=>Promise.all([loadPackages(),loadOrders()]));
    Promise.all([loadPackages(),loadOrders()]);
  </script>
</body>
</html>
